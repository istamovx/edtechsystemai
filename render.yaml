# Render Blueprint — Free plan'ga moslashtirilgan
# Bot ham web service sifatida ishlaydi (worker free'da yo'q)

databases:
  - name: coursue-db
    databaseName: coursue
    user: coursue
    plan: free
    region: frankfurt
    postgresMajorVersion: "16"

services:
  # ========== WEB APP (Next.js) ==========
  - type: web
    name: coursue-web
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    # Build vaqtida prisma generate + Next.js build (migratsiyani start'ga ko'chirdik)
    buildCommand: npm install && npx prisma generate && npm run build
    # Migratsiya start vaqtida ishlaydi — DB tayyor bo'lganda
    startCommand: npx prisma migrate deploy && npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: coursue-db
          property: connectionString
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_INTERNAL_URL
        value: https://coursue-bot.onrender.com
      - key: TURNSTILE_WEBHOOK_SECRET
        generateValue: true

  # ========== TELEGRAM BOT (web service — free plan'da worker yo'q) ==========
  - type: web
    name: coursue-bot
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    rootDir: telegram-bot
    buildCommand: npm install
    startCommand: node bot.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: coursue-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: BOT_INTERNAL_PORT
        value: "10000"   # Render web service standart port
