# Render Blueprint — Free plan
# Build muammolari hal qilingan: rootDir o'rniga buildCommand ichida cd

databases:
  - name: coursue-db
    databaseName: coursue
    user: coursue
    plan: free
    region: frankfurt
    postgresMajorVersion: "16"

services:
  # ========== WEB APP (Next.js) ==========
  - type: web
    name: coursue-web
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    buildCommand: npm install --legacy-peer-deps && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: coursue-db
          property: connectionString
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_INTERNAL_URL
        value: https://coursue-bot.onrender.com
      - key: TURNSTILE_WEBHOOK_SECRET
        generateValue: true
      # Build vaqtida Next.js'ga DATABASE_URL ishonarsiz bo'lsa skip qilish
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"

  # ========== TELEGRAM BOT ==========
  - type: web
    name: coursue-bot
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    buildCommand: cd telegram-bot && npm install
    startCommand: cd telegram-bot && node bot.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WEB_API_URL
        value: https://coursue-web.onrender.com
