# Render Blueprint — bir martalik klikda hammasi yaratiladi
# Render dashboard'da: New → Blueprint → repo'ni tanlash
# https://render.com/docs/blueprint-spec

databases:
  - name: coursue-db
    databaseName: coursue
    user: coursue
    plan: free            # boshlanishida bepul, keyin starter ($7/oy)
    region: frankfurt     # Toshkentga eng yaqin Render region
    postgresMajorVersion: "16"

services:
  # ========== WEB APP (Next.js) ==========
  - type: web
    name: coursue-web
    runtime: node
    plan: free            # Free tier 750 soat/oy. Production uchun starter ($7).
    region: frankfurt
    branch: main
    autoDeploy: true      # GitHub'ga push qilinsa avtomatik deploy
    buildCommand: |
      npm ci
      npx prisma generate
      npx prisma migrate deploy
      npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: coursue-db
          property: connectionString
      - key: NEXTAUTH_URL
        sync: false       # Render dashboard'da qo'lda kiritiladi: https://coursue-web.onrender.com
      - key: NEXTAUTH_SECRET
        generateValue: true   # avtomatik xavfsiz qiymat
      - key: ANTHROPIC_API_KEY
        sync: false       # qo'lda kiritiladi
      - key: TELEGRAM_BOT_TOKEN
        sync: false       # qo'lda kiritiladi (XAVFSIZ)
      - key: TELEGRAM_BOT_INTERNAL_URL
        value: http://coursue-bot:4000
      - key: TURNSTILE_WEBHOOK_SECRET
        generateValue: true

  # ========== TELEGRAM BOT (background worker) ==========
  - type: worker
    name: coursue-bot
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    buildCommand: |
      cd telegram-bot
      npm ci
      cd ..
      npx prisma generate
    startCommand: cd telegram-bot && node bot.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: coursue-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: BOT_INTERNAL_PORT
        value: "4000"
